<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>만들기 — AI 아티팩트 빌더 (관리자)</title>
    <style>
      :root { --bg:#f6f7fb; --card:#fff; --bd:#e3e6ef; --ink:#1c2333; --mut:#6b7280; --acc:#3b5bdb; --accd:#2f49b0; }
      * { box-sizing: border-box; }
      body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","맑은 고딕",sans-serif; background:var(--bg); color:var(--ink); }
      header { display:flex; align-items:center; gap:12px; padding:14px 20px; background:var(--card); border-bottom:1px solid var(--bd); position:sticky; top:0; z-index:5; }
      header h1 { font-size:17px; margin:0; }
      header .sub { color:var(--mut); font-size:13px; }
      header a.back { margin-left:auto; color:var(--acc); text-decoration:none; font-size:14px; }
      .wrap { display:grid; grid-template-columns: 380px 1fr; gap:16px; padding:16px; max-width:1500px; margin:0 auto; }
      @media (max-width: 900px){ .wrap{ grid-template-columns:1fr; } }
      .card { background:var(--card); border:1px solid var(--bd); border-radius:12px; padding:14px; }
      .card h2 { font-size:14px; margin:0 0 10px; }
      textarea { width:100%; min-height:120px; resize:vertical; padding:10px; border:1px solid var(--bd); border-radius:8px; font:inherit; }
      input[type=text] { width:100%; padding:8px 10px; border:1px solid var(--bd); border-radius:8px; font:inherit; }
      label { font-size:13px; color:var(--mut); display:block; margin:10px 0 4px; }
      select { padding:8px 10px; border:1px solid var(--bd); border-radius:8px; font:inherit; }
      .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
      button { background:var(--acc); color:#fff; border:0; border-radius:8px; padding:9px 14px; font:inherit; font-weight:600; cursor:pointer; }
      button:hover { background:var(--accd); }
      button.sec { background:#eef1fb; color:var(--accd); }
      button.ghost { background:transparent; color:var(--mut); border:1px solid var(--bd); }
      button:disabled { opacity:.5; cursor:not-allowed; }
      .preview { background:var(--card); border:1px solid var(--bd); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; min-height:70vh; }
      .preview .bar { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--bd); font-size:13px; color:var(--mut); }
      .preview iframe { border:0; width:100%; flex:1; min-height:60vh; background:#fff; }
      .muted { color:var(--mut); font-size:13px; }
      .status { font-size:13px; color:var(--mut); margin-top:8px; min-height:18px; }
      .list { display:flex; flex-direction:column; gap:8px; margin-top:10px; }
      .item { border:1px solid var(--bd); border-radius:8px; padding:8px 10px; font-size:13px; }
      .item .t { font-weight:600; }
      .item .u a { color:var(--acc); }
      .item .acts { margin-top:6px; display:flex; gap:6px; flex-wrap:wrap; }
      .item .acts button { padding:4px 9px; font-size:12px; font-weight:500; }
      .pill { display:inline-block; font-size:11px; padding:1px 7px; border-radius:99px; background:#eef1fb; color:var(--accd); }
      .pill.priv { background:#fdeaea; color:#b42318; }
      .gate { max-width:480px; margin:60px auto; text-align:center; }
      .toggle { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--ink); }
      .spin { display:inline-block; width:14px; height:14px; border:2px solid #c9d2f5; border-top-color:var(--acc); border-radius:50%; animation:sp .7s linear infinite; vertical-align:-2px; }
      @keyframes sp { to { transform:rotate(360deg);} }
    </style>
  </head>
  <body>
    <header>
      <h1>🛠 만들기</h1>
      <span class="sub">AI 아티팩트 빌더 · 관리자 전용</span>
      <a class="back" href="/admin.html">← 관리자</a>
    </header>

    <div id="gate" class="gate" style="display:none">
      <h2>관리자 전용</h2>
      <p class="muted">이 기능은 관리자 계정으로 로그인해야 사용할 수 있습니다.</p>
      <a href="/admin.html"><button>관리자 페이지로</button></a>
    </div>

    <div id="app" class="wrap" style="display:none">
      <!-- 좌: 입력/제어 -->
      <div>
        <div class="card">
          <h2>1. 무엇을 만들까요?</h2>
          <textarea id="prompt" placeholder="예) 학생들이 실험 일정을 입력하면 D-day와 함께 카드로 보여주는 위젯. 단원별 색상, 마감 임박은 빨강. / 또는: 이차방정식 근의 공식 계산기 with 그래프"></textarea>
          <label>AI 모델</label>
          <div class="row">
            <select id="model"></select>
            <button id="genBtn">생성</button>
            <button id="iterBtn" class="sec" disabled>이어서 수정</button>
          </div>
          <div class="status" id="status"></div>
        </div>

        <div class="card" style="margin-top:12px">
          <h2>2. 게시</h2>
          <label>제목</label>
          <input type="text" id="title" placeholder="예: 실험 일정 위젯" />
          <label>주소(slug) — 비우면 제목에서 자동</label>
          <input type="text" id="slug" placeholder="exp-schedule" />
          <div class="row" style="margin-top:10px; justify-content:space-between">
            <label class="toggle"><input type="checkbox" id="pub" checked /> 공개(URL 아는 사람 누구나)</label>
            <button id="saveBtn" disabled>게시</button>
          </div>
          <div class="status" id="saveStatus"></div>
        </div>

        <div class="card" style="margin-top:12px">
          <h2>내 아티팩트 <span id="persist" class="muted"></span></h2>
          <div class="list" id="list"><span class="muted">불러오는 중…</span></div>
        </div>
      </div>

      <!-- 우: 미리보기 -->
      <div class="preview">
        <div class="bar">
          <span>미리보기 (sandbox)</span>
          <span id="pvmodel" class="muted"></span>
          <button id="openBtn" class="ghost" style="margin-left:auto; padding:4px 10px; font-size:12px" disabled>새 탭에서 열기</button>
        </div>
        <iframe id="preview" sandbox="allow-scripts allow-forms allow-popups allow-modals" srcdoc="<!doctype html><meta charset=utf-8><body style='font-family:sans-serif;color:#9aa1b2;display:grid;place-items:center;height:90vh'>왼쪽에서 설명을 적고 <b>생성</b>을 누르세요.</body>"></iframe>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      let currentHtml = "";
      let lastSlug = "";

      async function api(path, opts) {
        const r = await fetch(path, { credentials: "same-origin", headers: { "Content-Type": "application/json" }, ...opts });
        let j = null; try { j = await r.json(); } catch {}
        if (!r.ok) throw new Error((j && j.error) || `${r.status}`);
        return j;
      }

      async function init() {
        try {
          const m = await api("/api/artifacts/models");
          $("model").innerHTML = m.models.map((x) => `<option value="${x}"${x === m.default ? " selected" : ""}>${x}</option>`).join("");
          $("app").style.display = "grid";
          loadList();
        } catch (e) {
          $("gate").style.display = "block";
        }
      }

      function setPreview(html) {
        currentHtml = html;
        $("preview").srcdoc = html;
        $("iterBtn").disabled = !html;
        $("saveBtn").disabled = !html;
        $("openBtn").disabled = true;
      }

      async function build(iterate) {
        const prompt = $("prompt").value.trim();
        if (!prompt) { $("status").textContent = "무엇을 만들지 적어주세요."; return; }
        $("genBtn").disabled = $("iterBtn").disabled = true;
        $("status").innerHTML = `<span class="spin"></span> 생성 중… (20~60초 걸릴 수 있어요)`;
        try {
          const body = { prompt, model: $("model").value };
          if (iterate && currentHtml) body.currentHtml = currentHtml;
          const j = await api("/api/artifacts/build", { method: "POST", body: JSON.stringify(body) });
          setPreview(j.html);
          $("pvmodel").textContent = "· " + (j.model || "");
          $("status").textContent = "완성! 미리보기를 확인하고, 마음에 들면 게시하세요.";
          if (!$("title").value.trim()) $("title").value = prompt.slice(0, 30);
        } catch (e) {
          $("status").textContent = "오류: " + e.message;
        } finally {
          $("genBtn").disabled = false;
          $("iterBtn").disabled = !currentHtml;
        }
      }

      async function save() {
        if (!currentHtml) return;
        $("saveBtn").disabled = true;
        $("saveStatus").innerHTML = `<span class="spin"></span> 게시 중…`;
        try {
          const j = await api("/api/artifacts", {
            method: "POST",
            body: JSON.stringify({ title: $("title").value.trim(), slug: $("slug").value.trim(), html: currentHtml, isPublic: $("pub").checked, overwrite: $("slug").value.trim() && $("slug").value.trim() === lastSlug }),
          });
          lastSlug = j.slug;
          const full = location.origin + j.url;
          $("saveStatus").innerHTML = `게시됨 → <a href="${j.url}" target="_blank">${full}</a>` + (j.persistent ? "" : " <span class='muted'>(임시 저장 — Supabase artifacts 테이블 없음)</span>");
          $("openBtn").disabled = false;
          $("openBtn").onclick = () => window.open(j.url, "_blank");
          $("slug").value = j.slug;
          loadList();
        } catch (e) {
          $("saveStatus").textContent = "오류: " + e.message;
        } finally {
          $("saveBtn").disabled = false;
        }
      }

      async function loadList() {
        try {
          const j = await api("/api/artifacts");
          $("persist").textContent = j.persistent ? "" : "(임시 저장 모드)";
          const a = j.artifacts || [];
          if (!a.length) { $("list").innerHTML = `<span class="muted">아직 없음.</span>`; return; }
          $("list").innerHTML = a.map((x) => `
            <div class="item">
              <div class="t">${esc(x.title)} <span class="pill ${x.is_public ? "" : "priv"}">${x.is_public ? "공개" : "비공개"}</span></div>
              <div class="u">/p/${esc(x.slug)} · <a href="/p/${encodeURIComponent(x.slug)}" target="_blank">열기</a></div>
              <div class="acts">
                <button class="sec" data-edit="${esc(x.slug)}">불러와 수정</button>
                <button class="ghost" data-del="${esc(x.id)}">삭제</button>
              </div>
            </div>`).join("");
          $("list").querySelectorAll("[data-edit]").forEach((b) => b.onclick = () => loadForEdit(b.dataset.edit));
          $("list").querySelectorAll("[data-del]").forEach((b) => b.onclick = () => del(b.dataset.del));
        } catch (e) {
          $("list").innerHTML = `<span class="muted">목록 오류: ${e.message}</span>`;
        }
      }

      async function loadForEdit(slug) {
        try {
          const j = await api("/api/artifacts/" + encodeURIComponent(slug) + "/raw");
          $("title").value = j.title || "";
          $("slug").value = j.slug || "";
          $("pub").checked = !!j.is_public;
          lastSlug = j.slug;
          setPreview(j.html);
          $("status").textContent = "불러왔습니다. 좌측에서 수정 요청 후 '이어서 수정' 하거나 바로 다시 게시하세요.";
          window.scrollTo({ top: 0, behavior: "smooth" });
        } catch (e) { $("status").textContent = "불러오기 오류: " + e.message; }
      }

      async function del(id) {
        if (!confirm("삭제할까요?")) return;
        try { await api("/api/artifacts/" + encodeURIComponent(id), { method: "DELETE" }); loadList(); }
        catch (e) { alert("삭제 오류: " + e.message); }
      }

      function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

      $("genBtn").onclick = () => build(false);
      $("iterBtn").onclick = () => build(true);
      $("saveBtn").onclick = save;
      init();
    </script>
  </body>
</html>
