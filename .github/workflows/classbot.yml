name: Quilo 일정 checks

on:
  push:
    paths:
      - "apps/classbot/**"
      - ".github/workflows/classbot.yml"
  pull_request:
    paths:
      - "apps/classbot/**"
      - ".github/workflows/classbot.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/classbot
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/classbot/package-lock.json
      - run: npm ci
      - run: npm run release:check
